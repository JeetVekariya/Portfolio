<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Workspace</title>
    <style>
        /* General Reset & Bulletproof Sizing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #1a1829; /* Dark purple room wall */
            color: white;
            overflow: hidden; /* Prevents scrollbars */
        }

        /* --- Room Scene --- */
        #room-scene {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transition: opacity 0.5s ease, transform 0.5s ease;
            border-bottom: 25px solid #0f0d1a; /* The Floor */
        }

        /* Wall Decorations */
        .window {
            position: absolute;
            top: 10%;
            left: 15%;
            width: 150px;
            height: 200px;
            background: #0b1021;
            border: 8px solid #2a2742;
            border-radius: 10px;
            box-shadow: inset 0 0 20px #000;
            overflow: hidden;
        }

        .moon {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #f6f1d5;
            border-radius: 50%;
            box-shadow: 0 0 15px #f6f1d5;
        }

        .poster {
            position: absolute;
            top: 15%;
            right: 20%;
            width: 120px;
            height: 160px;
            background: #ffbd2e;
            color: #1a1829;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            padding-top: 50px;
            border-radius: 5px;
            transform: rotate(4deg);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* --- Workspace Area (Locked Dimensions) --- */
        .workspace {
            position: absolute;
            bottom: 0px; /* Locked to the floor */
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 450px; /* Strict height prevents collapsing */
        }

        /* Gaming Chair (Back Layer) */
        .chair {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 220px;
            background: #222;
            border-radius: 20px 20px 0 0;
            z-index: 1;
            border-left: 5px solid #00e5ff;
            border-right: 5px solid #00e5ff;
        }

        /* Cartoon Character (Middle Layer) */
        .character {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2; 
        }

        .head {
            width: 70px;
            height: 80px;
            background: #ffcda5; 
            border-radius: 40%;
            position: absolute;
            bottom: 140px;
            left: -35px;
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.1);
        }

        .body {
            width: 90px;
            height: 130px;
            background: #ff5f56; 
            border-radius: 40px 40px 10px 10px;
            position: absolute;
            bottom: 20px;
            left: -45px;
        }

        .arm {
            width: 25px;
            height: 80px;
            background: #ff5f56;
            border-radius: 15px;
            position: absolute;
            bottom: 40px;
            transform-origin: top center;
        }

        .left-arm {
            left: -50px;
            animation: typeLeft 0.4s infinite alternate;
        }

        .right-arm {
            right: -50px;
            animation: typeRight 0.3s infinite alternate;
        }

        @keyframes typeLeft {
            0% { transform: rotate(25deg); }
            100% { transform: rotate(40deg); }
        }

        @keyframes typeRight {
            0% { transform: rotate(-25deg); }
            100% { transform: rotate(-40deg); }
        }

        /* Desk (Front Layer) */
        .desk {
            position: absolute;
            bottom: 40px;
            width: 100%;
            height: 35px;
            background: #4a3b32; 
            border-radius: 5px;
            border-bottom: 8px solid #2e241e;
            z-index: 3;
        }

        /* Laptop (Top Front Layer) */
        .laptop {
            position: absolute;
            bottom: 75px; /* Sits exactly on the desk */
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 95px;
            background: #1e1e1e;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: transform 0.2s ease;
            z-index: 4;
            border: 2px solid #333;
        }

        .laptop:hover {
            transform: translateX(-50%) scale(1.05);
        }

        .laptop-logo {
            position: absolute;
            bottom: 5px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #777;
            font-weight: bold;
        }

        .screen-glow {
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 25px;
            background: #00e5ff;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.8; box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }
            100% { opacity: 1; box-shadow: 0 0 30px rgba(0, 229, 255, 0.8); }
        }

        .tooltip {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
            pointer-events: none;
        }

        .laptop:hover .tooltip { opacity: 1; }

        /* --- OS Modal Styling --- */
        #os-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100;
        }

        #os-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .os-window {
            width: 80%;
            max-width: 800px;
            height: 60vh;
            background: #1e1e2e;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            transform: scale(0.9);
            transition: transform 0.4s ease;
        }

        #os-modal.active .os-window { transform: scale(1); }

        .window-header {
            background: #282a36;
            padding: 10px 15px;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; cursor: pointer; }
        .red:hover { box-shadow: 0 0 8px #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .title { margin-left: auto; margin-right: auto; color: #6272a4; font-size: 14px; }

        .folder-grid {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 30px;
            overflow-y: auto;
        }

        .folder {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            font-size: 40px;
            transition: transform 0.2s ease;
        }

        .folder:hover { transform: translateY(-5px); }
        .folder span {
            font-size: 12px;
            color: #f8f8f2;
            margin-top: 10px;
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="room-scene">
        <div class="window"><div class="moon"></div></div>
        <div class="poster">Logic<br>Lads ⚡</div>

        <div class="workspace">
            <div class="chair"></div>
            <div class="character">
                <div class="head"></div>
                <div class="body"></div>
                <div class="arm left-arm"></div>
                <div class="arm right-arm"></div>
            </div>
            <div class="desk"></div>
            <div class="laptop" id="laptop-trigger">
                <div class="screen-glow"></div>
                <div class="laptop-logo">TUF</div>
                <div class="tooltip">Enter Workspace</div>
            </div>
        </div>
    </div>

    <div id="os-modal">
        <div class="os-window">
            <div class="window-header">
                <div class="dot red" id="close-btn"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
                <div class="title">Developer_OS</div>
            </div>
            
            <div class="folder-grid">
                <div class="folder">📁<span>Jarvis_Bot</span></div>
                <div class="folder">📁<span>QR_Attendance</span></div>
                <div class="folder">📁<span>Call_Handler</span></div>
                <div class="folder">📁<span>Set_Payment_QR</span></div>
                <div class="folder">📁<span>Logic_Lads</span></div>
                <div class="folder">📁<span>PHP_Scripts</span></div>
                <div class="folder">📁<span>C_Programs</span></div>
            </div>
        </div>
    </div>

    <script>
        // The JavaScript to handle the clicks
        const laptop = document.getElementById('laptop-trigger');
        const osModal = document.getElementById('os-modal');
        const closeBtn = document.getElementById('close-btn');
        const roomScene = document.getElementById('room-scene');

        laptop.addEventListener('click', () => {
            osModal.classList.add('active');
            roomScene.style.transform = 'scale(0.95)';
            roomScene.style.opacity = '0.5';
        });

        closeBtn.addEventListener('click', () => {
            osModal.classList.remove('active');
            roomScene.style.transform = 'scale(1)';
            roomScene.style.opacity = '1';
        });
    </script>
</body>
</html>
