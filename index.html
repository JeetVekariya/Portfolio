<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: #0f0f0f;
  overflow: hidden;
  color: white;
}

/* Cursor Glow */
.cursor {
  position: fixed;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(0,255,200,0.25), transparent 60%);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: 0.1s;
}

/* Center Content */
.container {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* Animated Title */
h1 {
  font-size: 60px;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #00ffc3, #00aaff, #ff00ff);
  -webkit-background-clip: text;
  color: transparent;
  animation: glow 3s infinite linear;
}

@keyframes glow {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

/* Typing Effect */
.typing {
  margin-top: 20px;
  font-size: 20px;
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 4s steps(30, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
  to { width: 280px; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* Floating Particles */
.particle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #00ffc3;
  border-radius: 50%;
  opacity: 0.6;
  animation: float 10s linear infinite;
}

@keyframes float {
  from {
    transform: translateY(100vh);
  }
  to {
    transform: translateY(-10vh);
  }
}

/* Footer */
.footer {
  position: absolute;
  bottom: 20px;
  font-size: 14px;
  opacity: 0.6;
}

</style>
</head>

<body>

<div class="cursor"></div>

<div class="container">
  <h1>UNDER CONSTRUCTION</h1>
  <div class="typing">We are building something awesome...</div>
</div>

<div class="footer">© JRV Studio</div>

<script>

/* Cursor Follow Effect */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* Generate Particles */
for (let i = 0; i < 40; i++) {
  let particle = document.createElement("div");
  particle.classList.add("particle");

  particle.style.left = Math.random() * 100 + "vw";
  particle.style.animationDuration = (5 + Math.random() * 5) + "s";
  particle.style.opacity = Math.random();

  document.body.appendChild(particle);
}

</script>

</body>
</html>
